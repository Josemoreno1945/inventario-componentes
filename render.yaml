services:
  - type: web
    name: inventario-backend
    env: node
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventario-db
          property: connectionString
    disks:
      - name: data
        mountPath: /opt/render/project/src/backend
        sizeGB: 1
